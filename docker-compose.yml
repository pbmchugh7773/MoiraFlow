name: moiraflow

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/temporal:latest
    # In-memory dev server (state is ephemeral; execution metadata lives in Postgres).
    command: ["server", "start-dev", "--ip", "0.0.0.0", "--ui-port", "8233"]
    ports:
      - "${TEMPORAL_GRPC_PORT:-7233}:7233"
      - "${TEMPORAL_UI_PORT:-8233}:8233"

  redis:
    image: redis:7
    ports:
      - "${REDIS_PORT:-6380}:6379"

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data

  api:
    build:
      context: .
      dockerfile: deploy/docker/api.Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      TEMPORAL_HOST: ${TEMPORAL_HOST}
      MOIRAFLOW_EVENT_SUBSCRIBER: "1"
    ports:
      - "${API_PORT:-8001}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: deploy/docker/worker.Dockerfile
    env_file: .env
    environment:
      TEMPORAL_HOST: ${TEMPORAL_HOST}
      DATABASE_URL: ${DATABASE_URL}
      SECRETS_MASTER_KEY: ${SECRETS_MASTER_KEY}
    depends_on:
      temporal:
        condition: service_started

  # Local "thin agent": activities-only worker on agent-local; runs only `command`.
  # No DB access (never resolves secrets). Shares SECRETS_MASTER_KEY only for the
  # Temporal payload codec (ADR-0016); the *remote* agent (Hito 5) will instead use
  # per-agent envelope encryption (ADR-0013) and never hold this key.
  agent:
    build:
      context: .
      dockerfile: deploy/docker/worker.Dockerfile
    command: ["python", "-m", "moiraflow_worker.agent"]
    environment:
      TEMPORAL_HOST: ${TEMPORAL_HOST}
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE}
      SECRETS_MASTER_KEY: ${SECRETS_MASTER_KEY}
    depends_on:
      temporal:
        condition: service_started

  # Test SFTP server for the file_transfer SFTP path (profile: test — NOT part of the
  # default stack). Start with: docker compose --profile test up -d sftp
  sftp:
    image: atmoz/sftp:alpine
    profiles: ["test"]
    command: ["testuser:testpass:::upload"]
    volumes:
      - ./scripts/sftp-seed:/home/testuser/upload:ro

volumes:
  postgres-data:
  minio-data:
